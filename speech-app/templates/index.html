<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice to Text</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main>
      <h1>Voice to Text</h1>

      <div class="controls">
        <select id="providerSelect">
          <option value="local">Local Whisper</option>
          <option value="openai">OpenAI API</option>
        </select>
        <button id="recordButton">Record</button>
        <button id="stopButton" disabled>Stop</button>
      </div>

      <p id="status">Ready.</p>

      <div id="transcript" class="transcript">Your text will appear here.</div>

      <section class="robot-panel">
        <div class="section-header">
          <h2>Robot Pairing</h2>
          <p id="robotConnection" class="robot-connection">No robot paired.</p>
        </div>

        <div class="pair-grid">
          <label>
            Robot IP / Host
            <input id="robotHostInput" type="text" placeholder="192.168.1.42" />
          </label>

          <label>
            Robot Port
            <input id="robotPortInput" type="number" min="1" max="65535" value="8080" />
          </label>

          <label>
            Pairing Code
            <input id="robotPairingCodeInput" type="text" placeholder="robot pairing code" />
          </label>

          <label>
            Client Name
            <input id="robotClientNameInput" type="text" value="speech-app" />
          </label>
        </div>

        <div class="controls">
          <button id="discoverRobotsButton">Discover Robots on Network</button>
          <button id="pairRobotButton">Pair Robot</button>
          <button id="refreshRobotButton">Refresh Status</button>
          <button id="unpairRobotButton" disabled>Unpair</button>
          <button id="sendTranscriptButton" disabled>Send Transcript to Robot</button>
        </div>

        <p id="robotStatus" class="robot-status">
          Pair the speech app to your Pico 2 W over the current local network.
        </p>
        <div id="robotMeta" class="robot-meta"></div>
        <div id="discoveredRobots" class="discovered-robots">
          <p>No robots discovered yet.</p>
        </div>
      </section>

      <h2>History</h2>
      <div id="historyList" class="history">
        <p>No transcripts yet.</p>
      </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
