<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice to Text</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main>
      <h1>Voice to Text</h1>

      <div class="controls">
        <select id="providerSelect">
          <option value="local">Local Whisper</option>
          <option value="openai">OpenAI API</option>
        </select>
        <button id="recordButton">Record</button>
        <button id="stopButton" disabled>Stop</button>
      </div>

      <p id="status">Ready.</p>

      <div class="transcript-wrap">
        <div id="transcript" class="transcript">Your text will appear here.</div>
        <div class="transcript-controls">
          <select class="size-picker" id="transcriptSizePicker"></select>
          <button type="button" class="font-trigger" id="transcriptFontTrigger">
            <span class="font-trigger-label">Font</span>
            <span class="font-trigger-arrow">&#9662;</span>
          </button>
        </div>
      </div>

      <div class="braille-controls">
        <label class="braille-select-label">
          Braille
          <select id="brailleSelect">
            <option value="off">Off</option>
            <option value="1">Grade 1 (Uncontracted)</option>
            <option value="2">Grade 2 (Contracted)</option>
          </select>
        </label>
      </div>

      <div id="fontPickerPanel" class="font-picker-panel">
        <input type="text" class="font-picker-search" id="fontPickerSearch" placeholder="Search fonts..." autocomplete="off" />
        <div class="font-picker-list" id="fontPickerList"></div>
      </div>

      <section class="robot-panel">
        <div class="section-header">
          <h2>Robot Pairing</h2>
          <p id="robotConnection" class="robot-connection">No robot paired.</p>
        </div>

        <div class="pair-grid">
          <label>
            Robot IP / Host
            <input id="robotHostInput" type="text" placeholder="192.168.1.42" />
          </label>

          <label>
            Robot Port
            <input id="robotPortInput" type="number" min="1" max="65535" value="8080" />
          </label>

          <label>
            Pairing Code
            <input id="robotPairingCodeInput" type="text" placeholder="robot pairing code" />
          </label>

          <label>
            Client Name
            <input id="robotClientNameInput" type="text" value="speech-app" />
          </label>
        </div>

        <div class="controls">
          <button id="discoverRobotsButton">Discover Robots on Network</button>
          <button id="pairRobotButton">Pair Robot</button>
          <button id="refreshRobotButton">Refresh Status</button>
          <button id="unpairRobotButton" disabled>Unpair</button>
          <button id="sendTranscriptButton" disabled>Send Transcript to Robot</button>
        </div>

        <p id="robotStatus" class="robot-status">
          Pair the speech app to your Pico 2 W over the current local network.
        </p>
        <div id="robotMeta" class="robot-meta"></div>
        <div id="discoveredRobots" class="discovered-robots">
          <p>No robots discovered yet.</p>
        </div>
      </section>

      <h2>History</h2>
      <div id="historyList" class="history">
        <p>No transcripts yet.</p>
      </div>
    </main>

    <div id="previewModal" class="modal-overlay" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Toolpath Preview</h3>
          <button type="button" class="modal-close" id="previewModalClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-canvas-wrap">
            <canvas id="previewCanvas" width="540" height="700"></canvas>
            <div class="preview-playback">
              <button type="button" id="previewPlayPause" title="Play/Pause">&#9654;</button>
              <button type="button" id="previewRestart" title="Restart">&#8634;</button>
              <button type="button" id="previewSkip" title="Skip to end">&#9646;&#9646;</button>
              <select id="previewSpeed">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="5" selected>5x</option>
                <option value="10">10x</option>
              </select>
            </div>
          </div>
          <div class="preview-controls">
            <label>
              Paper Size
              <select id="previewPaperSize"></select>
            </label>
            <div id="customPaperFields" style="display:none">
              <label>Width (mm) <input type="number" id="previewPaperWidth" value="210" min="10" step="1" /></label>
              <label>Height (mm) <input type="number" id="previewPaperHeight" value="297" min="10" step="1" /></label>
            </div>
            <label>
              Font
              <button type="button" class="font-trigger" id="previewFontTrigger">
                <span class="font-trigger-label">Font</span>
                <span class="font-trigger-arrow">&#9662;</span>
              </button>
              <input type="hidden" id="previewFontValue" />
            </label>
            <label>
              Render Mode
              <select id="previewRenderMode">
                <option value="outline">Outline</option>
                <option value="filled">Filled (outline + hatching)</option>
                <option value="centerline">Single-stroke (centerline)</option>
              </select>
            </label>
            <label>
              Font Size (mm)
              <input type="number" id="previewFontSize" value="5" min="1" max="50" step="0.5" />
            </label>
            <label>
              Pen Tip (mm)
              <input type="number" id="previewPenTip" value="0.7" min="0.1" max="5" step="0.1" />
            </label>
            <fieldset class="margin-fields">
              <legend>Margins (mm)</legend>
              <label>Top <input type="number" id="previewMarginTop" value="10" min="0" step="1" /></label>
              <label>Right <input type="number" id="previewMarginRight" value="10" min="0" step="1" /></label>
              <label>Bottom <input type="number" id="previewMarginBottom" value="10" min="0" step="1" /></label>
              <label>Left <input type="number" id="previewMarginLeft" value="10" min="0" step="1" /></label>
            </fieldset>
            <fieldset class="offset-fields">
              <legend>Paper Offset (mm)</legend>
              <label>X <input type="number" id="previewOffsetX" value="0" step="1" /></label>
              <label>Y <input type="number" id="previewOffsetY" value="0" step="1" /></label>
            </fieldset>
          </div>
        </div>
        <div class="modal-footer">
          <div id="previewStats" class="preview-stats"></div>
          <button type="button" id="previewSendButton" disabled>Send to Robot (Phase 2)</button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
